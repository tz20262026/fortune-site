<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暴露仙人 | あなたの本性、全部バレてます</title>
    <meta name="description" content="AIが本性を暴露する毒舌占い。名前と生年月日を入れるだけ。">
    <meta property="og:title" content="暴露仙人 | あなたの本性、全部バレてます">
    <meta property="og:description" content="AIが本性を暴露する毒舌占い。名前と生年月日を入れるだけ。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #07000f;
            color: #f0e6ff;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        canvas#stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 580px;
            margin: 0 auto;
            padding: 20px 16px 60px;
            position: relative;
            z-index: 1;
        }

        /* ---- Header ---- */
        header {
            text-align: center;
            padding: 40px 0 28px;
        }

        .orb-wrap {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 32%, #a78bfa, #4c1d95 55%, #1e0040);
            box-shadow: 0 0 40px rgba(139,92,246,.6), 0 0 80px rgba(139,92,246,.2);
            animation: orb-pulse 3s ease-in-out infinite;
            cursor: default;
        }

        .orb::after {
            content: '';
            position: absolute;
            top: 18%; left: 22%;
            width: 28%; height: 20%;
            background: rgba(255,255,255,.25);
            border-radius: 50%;
            filter: blur(4px);
        }

        @keyframes orb-pulse {
            0%,100% { box-shadow: 0 0 40px rgba(139,92,246,.6), 0 0 80px rgba(139,92,246,.2); }
            50%      { box-shadow: 0 0 70px rgba(139,92,246,.9), 0 0 120px rgba(139,92,246,.35); }
        }

        h1 {
            font-family: 'Noto Serif JP', serif;
            font-size: 2.2rem;
            color: #fbbf24;
            text-shadow: 0 0 24px rgba(251,191,36,.5);
            letter-spacing: .06em;
        }

        .tagline {
            margin-top: 6px;
            color: #c4b5fd;
            font-size: .88rem;
            letter-spacing: .04em;
        }

        /* ---- Card ---- */
        .card {
            background: rgba(109,40,217,.09);
            border: 1px solid rgba(109,40,217,.35);
            border-radius: 18px;
            padding: 28px 24px;
            backdrop-filter: blur(14px);
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: .82rem;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 8px;
            letter-spacing: .03em;
        }

        input, textarea, select {
            width: 100%;
            background: rgba(0,0,0,.45);
            border: 1px solid rgba(109,40,217,.45);
            border-radius: 10px;
            padding: 12px 14px;
            color: #f0e6ff;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: .97rem;
            transition: border-color .25s, box-shadow .25s;
            -webkit-appearance: none;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 12px rgba(139,92,246,.4);
        }

        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) brightness(.7); cursor: pointer; }

        textarea { resize: vertical; min-height: 88px; }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #7c3aed, #db2777);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.08rem;
            font-weight: 700;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            letter-spacing: .04em;
            transition: transform .2s, box-shadow .2s, opacity .2s;
            box-shadow: 0 4px 20px rgba(124,58,237,.4);
        }

        .btn-main:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(124,58,237,.6);
        }

        .btn-main:active:not(:disabled) { transform: translateY(0); }
        .btn-main:disabled { opacity: .65; cursor: default; }

        /* ---- Loading ---- */
        #loading {
            display: none;
            text-align: center;
            padding: 50px 20px;
        }

        .loading-orb {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 32%, #a78bfa, #4c1d95 55%, #1e0040);
            margin: 0 auto 22px;
            animation: spin-glow 1.1s ease-in-out infinite;
        }

        @keyframes spin-glow {
            0%   { box-shadow: 0 0 20px rgba(139,92,246,.5); transform: scale(1); }
            50%  { box-shadow: 0 0 60px rgba(139,92,246,1);  transform: scale(1.12); }
            100% { box-shadow: 0 0 20px rgba(139,92,246,.5); transform: scale(1); }
        }

        .loading-msg {
            color: #c4b5fd;
            font-size: .95rem;
            animation: fade-blink 1.6s ease-in-out infinite;
        }

        @keyframes fade-blink {
            0%,100% { opacity: 1; }
            50%      { opacity: .3; }
        }

        /* ---- Result ---- */
        #resultCard {
            display: none;
            margin-top: 0;
        }

        .result-header {
            text-align: center;
            margin-bottom: 22px;
        }

        .result-title {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.15rem;
            color: #fbbf24;
            margin-bottom: 4px;
        }

        .result-for {
            color: #c4b5fd;
            font-size: .85rem;
        }

        .result-body {
            background: rgba(0,0,0,.3);
            border-radius: 12px;
            padding: 20px;
            line-height: 2;
            font-size: .97rem;
            white-space: pre-wrap;
            margin-bottom: 24px;
            border: 1px solid rgba(109,40,217,.2);
        }

        .btn-share {
            width: 100%;
            padding: 14px;
            background: #000;
            border: 1px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: .97rem;
            font-weight: 700;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background .2s;
        }

        .btn-share:hover { background: #111; }

        .btn-retry {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(109,40,217,.45);
            border-radius: 10px;
            color: #c4b5fd;
            font-size: .95rem;
            font-family: 'Noto Sans JP', sans-serif;
            cursor: pointer;
            transition: background .2s;
        }

        .btn-retry:hover { background: rgba(109,40,217,.12); }

        /* ---- Footer ---- */
        footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,.18);
            font-size: .75rem;
            line-height: 1.8;
        }

        /* ---- util ---- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">
    <header>
        <div class="orb-wrap"><div class="orb"></div></div>
        <h1>暴露仙人</h1>
        <p class="tagline">〜 あなたの本性、全部バレてます 〜</p>
    </header>

    <!-- Form -->
    <div class="card" id="formCard">
        <div class="form-group">
            <label>① あなたの名前（ニックネームOK）</label>
            <input type="text" id="name" placeholder="例：たろう、みかん、など" maxlength="20">
        </div>
        <div class="form-group">
            <label>② 生年月日</label>
            <input type="date" id="birthday">
        </div>
        <div class="form-group">
            <label>③ 今一番の悩み</label>
            <textarea id="worry" placeholder="例：仕事がうまくいかない、恋愛が進まない、なんとなくモヤモヤ..."></textarea>
        </div>
        <div class="form-group">
            <label>④ 自分の長所だと思うこと（自己申告）</label>
            <input type="text" id="strength" placeholder="例：優しい、真面目、面白い、など" maxlength="50">
        </div>
        <div class="form-group">
            <label>⑤ 最近ちょっとやらかしたこと（小さいことでOK）</label>
            <textarea id="blunder" placeholder="例：寝坊した、余計なことを言った、衝動買いした..."></textarea>
        </div>
        <button class="btn-main" onclick="getFortune()">🔮 本性を暴露してもらう</button>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div class="loading-orb"></div>
        <p class="loading-msg">仙人があなたを見透かしています…</p>
    </div>

    <!-- Result -->
    <div class="card" id="resultCard">
        <div class="result-header">
            <p class="result-title">🔮 暴露仙人のお告げ</p>
            <p class="result-for" id="resultFor"></p>
        </div>
        <div class="result-body" id="resultBody"></div>
        <button class="btn-share" onclick="shareResult()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            この結果をポストする
        </button>
        <button class="btn-retry" onclick="retry()">もう一度占う</button>
    </div>

    <footer>
        <p>※ これはエンターテインメントです。本性を暴露されても怒らないでください。</p>
        <p>© 暴露仙人</p>
    </footer>
</div>

<script>
// --- Stars ---
(function(){
    const c = document.getElementById('stars');
    const ctx = c.getContext('2d');
    function resize(){ c.width = innerWidth; c.height = innerHeight; draw(); }
    function draw(){
        ctx.clearRect(0,0,c.width,c.height);
        for(let i=0;i<180;i++){
            const x = Math.random()*c.width;
            const y = Math.random()*c.height;
            const r = Math.random()*1.2+.2;
            const a = Math.random()*.8+.2;
            ctx.beginPath();
            ctx.arc(x,y,r,0,Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${a})`;
            ctx.fill();
        }
    }
    window.addEventListener('resize', resize);
    resize();
})();

// --- Fortune ---
let lastResult = '';
let lastName = '';

async function getFortune(){
    const name     = document.getElementById('name').value.trim();
    const bday     = document.getElementById('birthday').value;
    const worry    = document.getElementById('worry').value.trim();
    const strength = document.getElementById('strength').value.trim();
    const blunder  = document.getElementById('blunder').value.trim();

    if(!name || !bday || !worry || !strength || !blunder){
        alert('全部入力してください！仙人は情報なしでは見透かせません。');
        return;
    }

    lastName = name;
    show('loading');

    try {
        const res = await fetch('/api/fortune', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, birthday: bday, worry, strength, blunder })
        });
        const data = await res.json();
        if(data.result){
            lastResult = data.result;
            document.getElementById('resultFor').textContent = name + 'さんへ';
            document.getElementById('resultBody').textContent = data.result;
            show('resultCard');
        } else {
            throw new Error();
        }
    } catch(e){
        alert('エラーが発生しました。もう一度お試しください。');
        show('formCard');
    }
}

function shareResult(){
    const preview = lastResult.length > 110 ? lastResult.slice(0,110)+'…' : lastResult;
    const text = `🔮 暴露仙人に本性を暴露されました\n\n${preview}\n\n#暴露仙人 #AI占い`;
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text), '_blank');
}

function retry(){
    show('formCard');
}

function show(id){
    ['formCard','loading','resultCard'].forEach(i => {
        document.getElementById(i).style.display = (i===id) ? (id==='loading'?'block':'block') : 'none';
    });
}
</script>
</body>
</html>
